{% set name = "aiida-cp2k" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 3825de7a2fa67bcc06dc4d95f3e4fc00369ca849dde7c29fdd786c7ec93b5fbc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.8
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=3.8
    - aiida-core >=2.0.0,<3.0.0
    - aiida-gaussian-datatypes
    - ase
    - ruamel.yaml >=0.16.5
    - cp2k-output-tools

test:
  imports:
    - aiida_cp2k
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/aiidateam/aiida-cp2k
  summary: The official AiiDA plugin for CP2K.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - chrisjsewell
